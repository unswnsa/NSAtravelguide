name: Sync Notion to Travel Guide

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch from Notion and build data.json
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_FORM_URL: ${{ secrets.NOTION_FORM_URL }}
        run: |
          node << 'EOF'
          const https = require('https');
          const fs = require('fs');

          const TOKEN = process.env.NOTION_TOKEN;
          const DB_ID = process.env.NOTION_DATABASE_ID;
          const FORM_URL = process.env.NOTION_FORM_URL || '';

          if (!TOKEN || !DB_ID) {
            console.error('ERROR: Missing NOTION_TOKEN or NOTION_DATABASE_ID secrets.');
            console.error('TOKEN set:', !!TOKEN, '| DB_ID set:', !!DB_ID);
            process.exit(1);
          }

          console.log('Token present:', TOKEN.slice(0,8) + '...');
          console.log('Database ID:', DB_ID);

          function notionPost(path, body) {
            return new Promise((resolve, reject) => {
              const data = JSON.stringify(body);
              const options = {
                hostname: 'api.notion.com',
                path,
                method: 'POST',
                headers: {
                  'Authorization': 'Bearer ' + TOKEN,
                  'Notion-Version': '2022-06-28',
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(data),
                }
              };
              const req = https.request(options, (res) => {
                let raw = '';
                res.on('data', chunk => raw += chunk);
                res.on('end', () => {
                  console.log('HTTP status:', res.statusCode);
                  try {
                    resolve({ status: res.statusCode, body: JSON.parse(raw) });
                  } catch (e) {
                    reject(new Error('Invalid JSON: ' + raw.slice(0, 300)));
                  }
                });
              });
              req.on('error', reject);
              req.write(data);
              req.end();
            });
          }

          function getText(prop) {
            if (!prop) return '';
            const t = prop.type;
            if (t === 'title')        return (prop.title || []).map(x => x.plain_text).join('');
            if (t === 'rich_text')    return (prop.rich_text || []).map(x => x.plain_text).join('');
            if (t === 'select')       return prop.select ? prop.select.name : '';
            if (t === 'multi_select') return (prop.multi_select || []).map(x => x.name).join(', ');
            if (t === 'status')       return prop.status ? prop.status.name : '';
            if (t === 'url')          return prop.url || '';
            if (t === 'email')        return prop.email || '';
            if (t === 'date')         return prop.date ? prop.date.start : '';
            if (t === 'checkbox')     return prop.checkbox ? 'Yes' : 'No';
            if (t === 'phone_number') return prop.phone_number || '';
            return '';
          }

          async function queryDatabase(filterBody) {
            try {
              const { status, body } = await notionPost('/v1/databases/' + DB_ID + '/query', filterBody);
              if (body.object === 'error') {
                console.warn('Filter failed (' + status + '):', body.message);
                return null;
              }
              return body;
            } catch (e) {
              console.warn('Query error:', e.message);
              return null;
            }
          }

          async function fetchAllApproved() {
            let results = [];

            // Attempt 1: Notion Status type
            console.log('\nAttempt 1: Status type filter...');
            let res = await queryDatabase({
              filter: { property: 'Status', status: { equals: 'Approved' } },
              sorts: [{ timestamp: 'created_time', direction: 'descending' }],
              page_size: 100
            });

            // Attempt 2: Select type
            if (!res) {
              console.log('Attempt 2: Select type filter...');
              res = await queryDatabase({
                filter: { property: 'Status', select: { equals: 'Approved' } },
                sorts: [{ timestamp: 'created_time', direction: 'descending' }],
                page_size: 100
              });
            }

            // Attempt 3: No filter — fetch all for diagnostics
            if (!res) {
              console.log('Attempt 3: No filter (fetching all for diagnostics)...');
              res = await queryDatabase({
                sorts: [{ timestamp: 'created_time', direction: 'descending' }],
                page_size: 10
              });

              if (res && res.results.length > 0) {
                console.log('\nPROPERTY NAMES AND TYPES in this database:');
                const props = res.results[0].properties;
                Object.entries(props).forEach(function(entry) {
                  console.log('  "' + entry[0] + '" -> type: ' + entry[1].type + ' | value: ' + (getText(entry[1]) || '[empty]'));
                });
                console.log('\nWriting all entries unfiltered so site shows something.');
                return res.results;
              } else if (res) {
                console.log('Database exists but has no entries yet.');
                return [];
              } else {
                console.error('All query attempts failed. Check NOTION_DATABASE_ID and that the integration is connected to the database (Connections menu in Notion).');
                process.exit(1);
              }
            }

            // Paginate
            results = res.results;
            let cursor = res.has_more ? res.next_cursor : null;
            while (cursor) {
              const page = await queryDatabase({
                filter: { property: 'Status', status: { equals: 'Approved' } },
                sorts: [{ timestamp: 'created_time', direction: 'descending' }],
                page_size: 100,
                start_cursor: cursor
              });
              if (!page) break;
              results = results.concat(page.results);
              cursor = page.has_more ? page.next_cursor : null;
            }

            return results;
          }

          (async function() {
            console.log('Starting Notion sync...\n');

            const pages = await fetchAllApproved();
            console.log('\nProcessing ' + pages.length + ' entries');

            const entries = pages.map(function(page, idx) {
              const p = page.properties;
              if (idx === 0) {
                console.log('\nProperty names found: ' + Object.keys(p).join(', '));
              }
              // Find the title field automatically as fallback
              const titleField = Object.values(p).find(function(v) { return v.type === 'title'; });
              return {
                id: page.id,
                title:       getText(p['Name'] || p['Title'] || p['Place Name'] || p['Recommendation'] || p['place name'] || titleField),
                city:        getText(p['City'] || p['Location'] || p['Region'] || p['city']),
                category:    getText(p['Category'] || p['Type'] || p['category']),
                description: getText(p['Description'] || p['Tip'] || p['Details'] || p['Notes'] || p['description']),
                link:        getText(p['Link'] || p['URL'] || p['Maps Link'] || p['Google Maps'] || p['url']),
                submittedBy: getText(p['Submitted By'] || p['Submitted by'] || p['Member'] || p['Your Name'] || p['member']),
                status:      getText(p['Status'] || p['status']),
                date: page.created_time
                  ? new Date(page.created_time).toLocaleDateString('en-AU', { year: 'numeric', month: 'short', day: 'numeric' })
                  : '',
              };
            });

            const output = {
              lastUpdated: new Date().toISOString(),
              formUrl: FORM_URL,
              totalEntries: entries.length,
              entries: entries
            };

            fs.writeFileSync('data.json', JSON.stringify(output, null, 2));
            console.log('\ndata.json written with ' + entries.length + ' entries');
            const cities = new Set(entries.map(function(e) { return e.city; }).filter(Boolean));
            console.log('Cities: ' + ([...cities].join(', ') || '(none yet)'));
            console.log('\nDone!');
          })();
          EOF

      - name: Show data.json preview
        run: |
          echo "=== data.json (first 60 lines) ==="
          head -60 data.json || echo "data.json not found"

      - name: Commit and push data.json
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          if git diff --staged --quiet; then
            echo "No changes to data.json — skipping commit"
          else
            git commit -m "chore: sync Notion entries [$(date -u '+%Y-%m-%d %H:%M')] [skip ci]"
            git push
          fi
