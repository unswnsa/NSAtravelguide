name: Sync Notion to Travel Guide

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build data.json from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_FORM_URL: ${{ secrets.NOTION_FORM_URL }}
        run: |
          node <<'EOF'
          const https = require('https');
          const fs = require('fs');

          const TOKEN = process.env.NOTION_TOKEN;
          const DB_ID = process.env.NOTION_DATABASE_ID;
          const FORM_URL = process.env.NOTION_FORM_URL || '';

          if (!TOKEN || !DB_ID) {
            console.error('Missing NOTION_TOKEN or NOTION_DATABASE_ID');
            process.exit(1);
          }

          function request(method, path, body = null) {
            return new Promise((resolve, reject) => {
              const data = body ? JSON.stringify(body) : null;

              const req = https.request({
                hostname: 'api.notion.com',
                path,
                method,
                headers: {
                  Authorization: `Bearer ${TOKEN}`,
                  'Notion-Version': '2022-06-28',
                  'Content-Type': 'application/json',
                  ...(data ? { 'Content-Length': Buffer.byteLength(data) } : {})
                }
              }, res => {
                let raw = '';
                res.on('data', d => raw += d);
                res.on('end', () => {
                  try {
                    resolve({
                      status: res.statusCode,
                      json: JSON.parse(raw)
                    });
                  } catch {
                    reject(new Error(raw));
                  }
                });
              });

              req.on('error', reject);
              if (data) req.write(data);
              req.end();
            });
          }

          function getText(prop) {
            if (!prop) return '';

            switch (prop.type) {
              case 'title':
                return (prop.title || []).map(x => x.plain_text).join('').trim();

              case 'rich_text':
                return (prop.rich_text || []).map(x => x.plain_text).join('').trim();

              case 'select':
                return prop.select?.name || '';

              case 'multi_select':
                return (prop.multi_select || []).map(x => x.name).join(', ');

              case 'status':
                return prop.status?.name || '';

              case 'url':
                return prop.url || '';

              case 'date':
                return prop.date?.start || '';

              case 'email':
                return prop.email || '';

              case 'phone_number':
                return prop.phone_number || '';

              case 'checkbox':
                return prop.checkbox ? 'Yes' : 'No';

              default:
                return '';
            }
          }

          // Supports Notion uploaded files + external links + URL columns
          function getFiles(prop) {
            if (!prop) return [];

            if (prop.type === 'files') {
              return (prop.files || []).map(file => {
                if (file.file?.url) return file.file.url;
                if (file.external?.url) return file.external.url;
                return '';
              }).filter(Boolean);
            }

            if (prop.type === 'url' && prop.url) {
              return [prop.url];
            }

            if (prop.type === 'rich_text') {
              const txt = (prop.rich_text || []).map(x => x.plain_text).join('').trim();
              return txt ? [txt] : [];
            }

            return [];
          }

          async function queryDatabase(filter) {
            const body = {
              page_size: 100,
              sorts: [
                { timestamp: 'created_time', direction: 'descending' }
              ],
              ...filter
            };

            const res = await request(
              'POST',
              `/v1/databases/${DB_ID}/query`,
              body
            );

            if (res.json.object === 'error') {
              throw new Error(res.json.message);
            }

            return res.json;
          }

          async function fetchAllPages() {
            let first;

            try {
              first = await queryDatabase({
                filter: {
                  property: 'Status',
                  status: { equals: 'Approved' }
                }
              });
            } catch {
              try {
                first = await queryDatabase({
                  filter: {
                    property: 'Status',
                    select: { equals: 'Approved' }
                  }
                });
              } catch {
                first = await queryDatabase({});
              }
            }

            let results = first.results || [];
            let cursor = first.has_more ? first.next_cursor : null;

            while (cursor) {
              const next = await queryDatabase({
                start_cursor: cursor
              });

              results = results.concat(next.results || []);
              cursor = next.has_more ? next.next_cursor : null;
            }

            return results;
          }

          function buildEntry(page) {
            const p = page.properties || {};

            const titleField =
              Object.values(p).find(v => v.type === 'title');

            const photos = [
              ...getFiles(p['Photos']),
              ...getFiles(p['Photo 1']),
              ...getFiles(p['Photo 2']),
              ...getFiles(p['Photo 3'])
            ].filter(Boolean);

            return {
              id: page.id,

              title: getText(
                p['Name'] ||
                p['Title'] ||
                p['Place Name'] ||
                p['Recommendation'] ||
                titleField
              ),

              city: getText(
                p['City'] ||
                p['Location'] ||
                p['Region']
              ),

              category: getText(
                p['Category'] ||
                p['Type']
              ),

              description: getText(
                p['Description'] ||
                p['Tip'] ||
                p['Details'] ||
                p['Notes']
              ),

              mapLink: getText(
                p['Map Link'] ||
                p['Google Maps'] ||
                p['Maps Link']
              ),

              website: getText(
                p['Website'] ||
                p['Link'] ||
                p['URL']
              ),

              photos,

              submittedBy: getText(
                p['Submitted By'] ||
                p['Submitted by'] ||
                p['Member'] ||
                p['Your Name']
              ),

              status: getText(p['Status']),

              date: page.created_time
                ? new Date(page.created_time).toLocaleDateString('en-AU', {
                    year: 'numeric',
                    month: 'short',
                    day: 'numeric'
                  })
                : ''
            };
          }

          (async () => {
            console.log('Syncing Notion...');

            const pages = await fetchAllPages();

            const entries = pages
              .map(buildEntry)
              .filter(e => e.title);

            const cities = [
              ...new Set(entries.map(e => e.city).filter(Boolean))
            ];

            const output = {
              lastUpdated: new Date().toISOString(),
              totalEntries: entries.length,
              totalCities: cities.length,
              formUrl: FORM_URL,
              entries
            };

            fs.writeFileSync(
              'data.json',
              JSON.stringify(output, null, 2)
            );

            console.log(`Created data.json with ${entries.length} entries`);
          })().catch(err => {
            console.error(err);
            process.exit(1);
          });
          EOF

      - name: Preview data.json
        run: |
          echo "===== data.json preview ====="
          head -80 data.json || true

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add data.json

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: sync notion travel guide [skip ci]"
            git push
          fi
